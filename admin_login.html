<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Dev Boot Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 2rem; width: 100%; max-width: 400px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .form-control { background-color: #0d1117; border: 1px solid #30363d; color: #c9d1d9; }
        .form-control:focus { background-color: #0d1117; color: #c9d1d9; border-color: #e63946; box-shadow: 0 0 0 0.25rem rgba(230, 57, 70, 0.25); }
        .btn-crimson { background-color: #e63946; color: #fff; border: none; }
        .btn-crimson:hover { background-color: #d62828; color: #fff; }
    </style>
<link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='images/favicon.jpg') }}"></head>
<body>

<div class="login-card">
    <h3 class="text-center mb-4 text-danger fw-bold"><i class="fa-solid fa-khanda me-2"></i> DBF Admin Portal</h3>
    
    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin_login') }}">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username" required>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-crimson w-100 fw-bold">Login to Dashboard</button>
    </form>
    
    <div class="mt-4">
        <a href="http://localhost:5000/" class="text-secondary text-decoration-none small">Return to Storefront</a>
    </div>
</div>

</body>
</html>
