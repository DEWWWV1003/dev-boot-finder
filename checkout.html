<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout - Dev Boot Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: url('/static/images/stadium_bg.jpg') no-repeat center center fixed; 
            background-size: cover; 
            color: #c9d1d9; font-family: 'Inter', sans-serif; 
        }
        .glass-card { 
            background-color: rgba(22, 27, 34, 0.75); 
            border: 1px solid rgba(48, 54, 61, 0.5); 
            border-radius: 12px; 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
        .form-control { background-color: rgba(13, 17, 23, 0.8); border: 1px solid #30363d; color: #fff; }
        .form-control:focus { background-color: rgba(13, 17, 23, 0.9); color: #fff; border-color: #00f0ff; box-shadow: 0 0 0 0.25rem rgba(0, 240, 255, 0.25); }
        .btn-glow { background-color: #00f0ff; color: #000; border: none; font-weight: bold; }
        .btn-glow:hover { background-color: #00e0ef; box-shadow: 0 0 20px rgba(0, 240, 255, 0.6); color: #000; }
    </style>
<link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='images/favicon.jpg') }}"></head>
<body>

{% include 'navbar.html' %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="glass-card p-5 shadow-lg">
                {% if success %}
                    <div class="text-center py-5">
                        <i class="fa-solid fa-circle-check fa-5x text-success mb-4"></i>
                        <h2 class="fw-bold text-white mb-3">Order Placed Successfully!</h2>
                        <p class="text-secondary fs-5 mb-4">Your order has been recorded in our system. Thank you for shopping at Dev Boot Finder.</p>
                        <a href="{{ url_for('index') }}" class="btn btn-outline-info rounded-pill px-4 py-2">Return to Store</a>
                    </div>
                {% else %}
                    <h2 class="fw-bold text-white mb-4"><i class="fa-solid fa-lock text-info me-2"></i> Secure Checkout</h2>
                    <form method="POST" action="{{ url_for('checkout') }}">
                        <h5 class="text-white mb-3 mt-4">Shipping Details</h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Address</label>
                                <input type="text" class="form-control" required>
                            </div>
                        </div>

                        <h5 class="text-white mb-3 mt-5">Payment Details (Mock)</h5>
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label">Card Number</label>
                                <input type="text" class="form-control" placeholder="1234 5678 9101 1121" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Expiry Date</label>
                                <input type="text" class="form-control" placeholder="MM/YY" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">CVV</label>
                                <input type="text" class="form-control" placeholder="123" required>
                            </div>
                        </div>
                        
                        <hr class="border-secondary my-4">
                        
                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="tos_agreement" name="tos_agreement" required style="accent-color: #00f0ff;">
                            <label class="form-check-label text-secondary" for="tos_agreement">
                                I agree to the DBF <a href="{{ url_for('terms') }}" target="_blank" class="text-info fw-bold text-decoration-none">Terms of Service</a> and confirm my purchase details are accurate.
                            </label>
                        </div>

                        <button type="submit" class="btn btn-glow w-100 py-3 rounded-pill fs-5">Place Order</button>
                    </form>
                {% endif %}
            </div>
        </div>
    </div>
</div>

{% include 'footer.html' %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
