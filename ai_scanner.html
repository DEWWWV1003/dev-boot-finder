<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI VR Foot Scanner | DBF</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='images/favicon.jpg') }}">
    <style>
        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .top-nav {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
            z-index: 10;
        }

        .vr-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
        }

        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }

        .scanning-overlay {
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(rgba(0, 229, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 2;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(0, 229, 255, 0.8);
            box-shadow: 0 0 20px 5px rgba(0, 229, 255, 0.5);
            animation: scan 3s linear infinite;
            z-index: 3;
            display: none;
        }

        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .vr-ui {
            position: absolute;
            z-index: 4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .target-box {
            width: 250px;
            height: 350px;
            border: 2px dashed rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            position: relative;
            margin-bottom: 20px;
        }

        .target-box::before, .target-box::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid var(--accent-blue);
        }
        .target-box::before { top: -4px; left: -4px; border-right: none; border-bottom: none; }
        .target-box::after { bottom: -4px; right: -4px; border-left: none; border-top: none; }

        .scan-btn {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .scan-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.6);
        }

        .upload-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .upload-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }

        /* Results Panel */
        .results-panel {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .result-card {
            background: #111;
            border: 1px solid var(--accent-blue);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.2);
        }

        .data-readout {
            font-family: 'Space Mono', monospace;
            color: var(--accent-blue);
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .size-display {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
        }
        
        .loading-text {
            font-family: 'Space Mono', monospace;
            color: white;
            font-size: 1.2rem;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <a href="{{ url_for('index') }}" style="color: white; text-decoration: none; font-size: 1.2rem; font-weight: 800;">
            <i class="fa-solid fa-arrow-left" style="margin-right: 10px;"></i> Back to Store
        </a>
        <div style="font-family: 'Space Mono', monospace; color: var(--accent-blue);">
            <i class="fa-solid fa-microchip"></i> DBF AI ENGINE V2.0
        </div>
    </div>

    <div class="vr-container">
        <video id="videoElement" autoplay playsinline></video>
        <div class="scanning-overlay"></div>
        <div class="scan-line" id="scanLine"></div>
        
        <div class="vr-ui" id="vrUI">
            <div style="text-align: center; margin-bottom: 10px;">
                <h2 style="margin: 0; font-size: 1.5rem; text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);">Place your foot in the frame</h2>
                <p style="color: var(--text-secondary); margin-top: 5px; font-size: 0.9rem;">Ensure you are barefoot and on a flat surface.</p>
            </div>
            
            <div class="target-box"></div>
            
            <div style="display: flex; gap: 15px; margin-top: 10px;">
                <button class="scan-btn" onclick="startScan()"><i class="fa-solid fa-camera-viewfinder" style="margin-right: 10px;"></i> Initiate Scan</button>
                <button class="upload-btn" onclick="document.getElementById('fileUpload').click()"><i class="fa-solid fa-upload" style="margin-right: 10px;"></i> Upload Photo</button>
            </div>
            <input type="file" id="fileUpload" accept="image/*" style="display: none;" onchange="handleFileUpload(event)">
            
            <div class="loading-text" id="loadingText">Processing Random Forest Algorithm...</div>
        </div>

        <div class="results-panel" id="resultsPanel">
            <div class="result-card">
                <i class="fa-solid fa-check-circle" style="font-size: 4rem; color: var(--accent-green); margin-bottom: 20px;"></i>
                <h2 style="margin-top: 0;">Scan Complete</h2>
                
                <div class="data-readout" id="aiAccuracy">Model Accuracy: 99.8%</div>
                
                <div style="display: flex; justify-content: center; gap: 40px; margin: 30px 0;">
                    <div>
                        <div style="color: var(--text-secondary); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 2px;">Recommended Size</div>
                        <div class="size-display" id="aiSize">US 9</div>
                    </div>
                </div>
                
                <div style="background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 10px; margin-bottom: 30px;">
                    <div style="color: var(--text-secondary); margin-bottom: 5px;">Foot Profile Analysis</div>
                    <strong style="font-size: 1.2rem; color: var(--accent-pink);" id="aiShape">Normal Fit</strong>
                </div>
                
                <a href="{{ url_for('index') }}" style="display: inline-block; background: white; color: black; text-decoration: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; width: 100%; box-sizing: border-box;">Shop My Size</a>
            </div>
        </div>
        
        <!-- Hidden canvas to capture image -->
        <canvas id="canvasElement" style="display: none;"></canvas>
    </div>

    <script>
        const video = document.getElementById('videoElement');
        
        // Request Camera Access
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(function (stream) {
                    video.srcObject = stream;
                })
                .catch(function (err) {
                    console.log("Something went wrong with camera!", err);
                    alert("Please enable camera access to use the VR Foot Scanner.");
                });
        }

        function processImageAndScan(imageData) {
            // UI Updates
            document.querySelector('.scan-btn').style.display = 'none';
            document.querySelector('.upload-btn').style.display = 'none';
            document.getElementById('loadingText').style.display = 'block';
            document.getElementById('scanLine').style.display = 'block';
            
            // Send to backend
            fetch('/api/analyze-foot', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ image: imageData })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    // Show results after a short delay for dramatic effect
                    setTimeout(() => {
                        document.getElementById('vrUI').style.display = 'none';
                        document.getElementById('scanLine').style.display = 'none';
                        
                        document.getElementById('aiSize').innerText = data.predicted_size;
                        document.getElementById('aiShape').innerText = data.foot_shape + ' Fit';
                        document.getElementById('aiAccuracy').innerText = 'Model Accuracy: ' + data.accuracy + '%';
                        
                        document.getElementById('resultsPanel').style.display = 'flex';
                    }, 2000);
                } else {
                    alert("Error scanning: " + data.error);
                    resetScanUI();
                }
            })
            .catch(err => {
                console.error(err);
                alert("Connection error.");
                resetScanUI();
            });
        }

        function resetScanUI() {
            document.querySelector('.scan-btn').style.display = 'block';
            document.querySelector('.upload-btn').style.display = 'block';
            document.getElementById('loadingText').style.display = 'none';
            document.getElementById('scanLine').style.display = 'none';
        }

        function startScan() {
            // Capture image frame from video
            const canvas = document.getElementById('canvasElement');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = canvas.toDataURL('image/jpeg');
            
            processImageAndScan(imageData);
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                // If they upload a file, we can optionally pause the video or just hide it
                // For now, let's just show the uploaded image instead of the video feed
                video.style.display = 'none';
                
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('canvasElement');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    
                    // Display the canvas in place of the video to show what they uploaded
                    canvas.style.display = 'block';
                    canvas.style.width = '100%';
                    canvas.style.height = '100%';
                    canvas.style.objectFit = 'contain';
                    canvas.style.opacity = '0.7';
                    canvas.style.position = 'absolute';
                    canvas.style.zIndex = '1';
                    
                    const imageData = canvas.toDataURL('image/jpeg');
                    processImageAndScan(imageData);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
